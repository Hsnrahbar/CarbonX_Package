reactions:


- equation: S + H => H_s  # sr1 forward
  rate-constant: {A: 1.0e13, b: 0.0, Ea: 0.0}
- equation: N/A  # sr1 reverse (irreversible)
  rate-constant: {A: ..., b: ..., Ea: ...}

- equation: H_s + H => S + H2  # sr2 forward
  rate-constant: {A: 1.3e14, b: 0.0, Ea: 7.3}
- equation: N/A  # sr2 reverse (irreversible)
  rate-constant: {A: ..., b: ..., Ea: ...}

