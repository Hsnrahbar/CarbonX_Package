###CarbonX###
# Version 0.2
# Surface reactions (Table 1) converted to CarbonX YAML format
# Notes:
# - "=>" used for reactions.
# - Each forward reaction is followed by a reverse slot.
# - If irreversible: reverse slot equation is N/A with placeholder rate-constant fields.
# - Species with "(s)" are written as "_s" (e.g., CH3(s) -> CH3_s).
# - Species with "(NT)" are written as "_NT" (e.g., C(NT) -> C_NT).

#-----------------------------------------------------------------------------------------

phases:
  #name: gas
  atomic_masses: {Fe: 55.845, C: 12.011, O: 15.999, Al: 26.982, N: 14.007, Ni: 58.693, Au: 196.967, Ag: 107.868, Co: 58.933, He: 4.003, Ar: 39.948, Mo: 95.95, H: 1.008}
